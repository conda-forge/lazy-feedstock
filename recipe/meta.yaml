{% set name = "lazy" %}
{% set version = "2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/lazy-{{ version }}.tar.gz
  sha256: f92ec0d32dd6bd115ddec4e3323473ebc0b682ad58c6aca78ebfd9e6d1aa5777

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
test:
  imports:
    - lazy
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}
about:
  home: https://github.com/stefanholek/lazy
  summary: Lazy attributes for Python objects
  doc_url: https://pythonhosted.org/lazy/
  license: BSD-2-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - pmlandwehr
    - thewchan
